<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Works</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d30000;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    /* 🔥 GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* элементы */
    .item {
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 180px;
      border: none;
      display: block;
    }

    img {
      width: 100%;
      display: block;
    }

    /* 📱 мобилка */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <a href="/index.html" class="back">← Back</a>

    <h1>WORKS</h1>

    <div class="grid">

      <!-- 🎥 видео -->
      <div class="item">
        <iframe src="https://www.youtube.com/embed/22bKzNIpnkE?controls=0&modestbranding=1"></iframe>
      </div>

      <div class="item">
        <iframe src="https://www.youtube.com/embed/uFL49LiiqxM?controls=0&modestbranding=1"></iframe>
      </div>

      <!-- 📸 фото -->
      <div class="item">
        <img src="images/pic1.jpg">
      </div>

      <div class="item">
        <img src="images/pic2.jpg">
      </div>

      <div class="item">
        <img src="images/pic3.jpg">
      </div>

    </div>

  </div>

</body>
</html>

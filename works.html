<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Works</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d30000;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: black;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    /* 🔥 СЕТКА (сильнее видно) */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    /* 🔥 КАРТОЧКИ */
    .card {
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 12px;
    }

    iframe {
      width: 100%;
      height: 220px;
      border: none;
      display: block;
    }

    img {
      width: 100%;
      display: block;
    }

    /* 📱 МОБИЛКА */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 240px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <a href="/index.html" class="back">← Back</a>

    <h1>WORKS</h1>

    <div class="grid">


      <!-- 📸 -->
      <div class="card">
        <img src="images/pic1.jpg">
      </div>

      <div class="card">
        <img src="images/pic2.jpg">
      </div>

      <div class="card">
        <img src="images/pic3.jpg">
      </div>

    </div>

  </div>

</body>
</html>

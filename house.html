<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>House</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #d30000;
  font-family: Helvetica, Arial, sans-serif;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 5px 20px;
}

img {
  width: 100%;
  display: block;
  margin-bottom: 30px;
}

h1 {
  font-size: 20px;
}

/* 🔥 бургер */
.menu-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 28px;
  height: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: none;
  border: none;
  z-index: 9999;
}

.menu-toggle span {
  height: 2px;
  background: black;
}

/* 📱 меню */
.side-menu {
  position: fixed;
  top: 70px;
  right: 20px;
  width: 160px;
  padding: 18px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-10px);
  transition: 0.3s;
  z-index: 9999;
}

body.menu-open .side-menu {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.side-menu a {
  display: block;
  margin-bottom: 12px;
  color: white;
  text-decoration: none;
}

.close-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.close-btn::before,
.close-btn::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 16px;
  height: 2px;
  background: white;
}

.close-btn::before {
  transform: translate(-50%, -50%) rotate(45deg);
}

.close-btn::after {
  transform: translate(-50%, -50%) rotate(-45deg);
}

.divider {
  width: 100%;
  height: 1px;
  background: black;
  margin: 15px 0 25px 0;
}
</style>
</head>

<body>

<button class="menu-toggle">
  <span></span>
  <span></span>
  <span></span>
</button>

<div class="side-menu">
  <div class="close-btn"></div>
  <a href="index.html">Home</a>
  <a href="video.html">Video</a>
  <a href="works.html">Works</a>
  <a href="housing.html">Housing</a>
  <a href="mailto:thebiggestnobody777@gmail.com">Contact</a>
</div>

<div class="container">
  <h1>HOUSING</h1>
  <div class="divider"></div>

  <!-- 🔥 ФОТО -->
  <img src="images/house1.jpg">
  <img src="images/house2.jpg">
  <img src="images/house3.jpg">
  <img src="images/house4.jpg">
  <img src="images/house5.jpg">
  <img src="images/house6.jpg">
  <img src="images/house7.jpg">
  <img src="images/house8.jpg">
  <img src="images/house9.jpg">

</div>

<script>
const btn = document.querySelector('.menu-toggle');
const closeBtn = document.querySelector('.close-btn');

btn.onclick = () => document.body.classList.toggle('menu-open');
closeBtn.onclick = () => document.body.classList.remove('menu-open');
</script>

</body>
</html>

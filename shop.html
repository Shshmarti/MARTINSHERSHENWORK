<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#d30000;
  font-family:Helvetica, Arial, sans-serif;
  color:black;
}

/* УБИРАЕМ СИНИЙ ЦВЕТ */
a,
a:visited,
a:hover,
a:active,
button{
  color:black;
}

button{
  font-family:Helvetica, Arial, sans-serif;
}

/* стартовый экран */
.start-screen{
  position:fixed;
  inset:0;
  background:#d30000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.start-box{
  text-align:center;
  padding:30px;
  width:100%;
  max-width:420px;
}

.start-box h1{
  font-size:26px;
  margin-bottom:18px;
}

.choice-btn{
  display:block;
  width:100%;
  margin-bottom:15px;
  padding:18px;
  border:1px solid black;
  background:transparent;
  color:black;
  font-size:18px;
  cursor:pointer;
  text-decoration:none;
}

.choice-btn:hover{
  background:black;
  color:white;
}
</style>
</head>
<body>

<div class="start-screen">
  <div class="start-box">

    <h1>MARTSIN SHERSHAN</h1>

    <button class="choice-btn" onclick="window.location.href='shop.html'">
      SHOP SERVISEX
    </button>

    <button class="choice-btn" onclick="window.location.href='works.html'">
      ARTWORKS
    </button>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP SERVISEX</title>

<style>
body{
  margin:0;
  background:#d30000;
  color:black;
  font-family:Helvetica, Arial, sans-serif;
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:20px;
}

h1{
  font-size:26px;
  margin-bottom:10px;
}

.top-link{
  display:inline-block;
  margin-bottom:30px;
  color:black;
  text-decoration:none;
  border-bottom:1px solid black;
}

.product{
  margin-bottom:55px;
  padding-bottom:35px;
  border-bottom:1px solid rgba(0,0,0,0.35);
}

/* ГАЛЕРЕЯ */
.gallery{
  position:relative;
  margin-bottom:15px;
}

.slide{
  display:none;
  width:100%;
}

.slide.active{
  display:block;
}

.slide img{
  width:100%;
  display:block;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(0,0,0,0.35);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
}

.left{ left:10px; }
.right{ right:10px; }

.name{
  font-size:22px;
  margin-bottom:8px;
}

.desc{
  font-size:14px;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  font-size:16px;
  margin-bottom:8px;
}

.color{
  font-size:13px;
  margin-bottom:18px;
  opacity:0.7;
}

.buy-btn{
  display:inline-block;
  padding:14px 24px;
  border:1px solid black;
  color:black;
  text-decoration:none;
  font-size:14px;
}

.buy-btn:hover{
  background:black;
  color:white;
}

.footer{
  padding:40px 0 20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="container">

<h1>SHOP SERVISEX</h1>
<a href="index.html" class="top-link">← BACK</a>

<!-- ITEM -->
<div class="product">

<div class="gallery">

<!-- BLACK -->
<div class="slide active">
  <img src="images/item1-black.jpg">
</div>

<!-- WHITE -->
<div class="slide">
  <img src="images/item1-white.jpg">
</div>

<div class="arrow left">‹</div>
<div class="arrow right">›</div>

</div>

<div class="name">лонгслив порно студия у шамиля</div>
<div class="desc">100 хлопок / золотая классика.</div>
<div class="price">70$</div>

<div class="color" id="colorText">Color: Black</div>

<a href="https://BLACK-LINK-HERE"
   id="buyBtn"
   class="buy-btn"
   target="_blank">
BUY NOW
</a>

</div>

<div class="footer">
© MARTSIN SHERSHAN / SERVISEX
</div>

</div>

<script>
const slides = document.querySelectorAll('.slide');
const left = document.querySelector('.left');
const right = document.querySelector('.right');
const colorText = document.getElementById('colorText');
const buyBtn = document.getElementById('buyBtn');

let current = 0;

/* ссылки на оплату */
const buyLinks = [
  "https://BLACK-LINK-HERE",
  "https://WHITE-LINK-HERE"
];

/* названия цветов */
const colors = [
  "Black",
  "White"
];

function updateSlides(){
  slides.forEach(slide => slide.classList.remove('active'));
  slides[current].classList.add('active');

  colorText.innerText = "Color: " + colors[current];

  /* меняем ссылку */
  buyBtn.href = buyLinks[current];
}

right.onclick = () => {
  current = (current + 1) % slides.length;
  updateSlides();
};

left.onclick = () => {
  current = (current - 1 + slides.length) % slides.length;
  updateSlides();
};
</script>

</body>
</html>

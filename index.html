<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d30000;
      font-family: Helvetica, Arial, sans-serif;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 5px 20px;
    }

    img {
      width: 100%;
      display: block;
    }

    h1 {
      font-size: 20px;
    }

    /* 🔥 ЖУРНАЛ */
    .cover {
      position: relative;
      margin-bottom: 40px;
    }

    .slide {
      display: none;
    }

    .slide.active {
      display: block;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    .left { left: 10px; }
    .right { right: 10px; }

    /* кнопки */
    .buy-btn {
      position: absolute;
      bottom: 60px;
      left: 20px;
      padding: 12px 18px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
    }

    .alt-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 10px 16px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
    }

    /* бонус */
    .bonus {
      margin: 40px 0;
    }

    /* 🔥 ГАЛЕРЕЯ */
    .gallery {
      position: relative;
      margin-top: 40px;
    }

    .g-slide {
      display: none;
    }

    .g-slide.active {
      display: block;
    }

    .g-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 10px 14px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .g-left { left: 10px; }
    .g-right { right: 10px; }

    /* меню */
    .menu-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 28px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: none;
      background: none;
      z-index: 9999;
    }

    .menu-toggle span {
      height: 2px;
      background: black;
    }

    .side-menu {
      position: fixed;
      top: 70px;
      right: 20px;
      width: 160px;
      padding: 18px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-10px);
      transition: 0.3s;
    }

    body.menu-open .side-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .side-menu a {
      display: block;
      margin-bottom: 12px;
      color: white;
      text-decoration: none;
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .close-btn::before,
    .close-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 2px;
      background: white;
    }

    .close-btn::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .close-btn::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }
  </style>
</head>

<body>

<button class="menu-toggle">
  <span></span>
  <span></span>
  <span></span>
</button>

<div class="side-menu">
  <div class="close-btn"></div>
  <a href="video.html">Video</a>
  <a href="works.html">Works</a>
  <a href="mailto:thebiggestnobody777@gmail.com">Contact</a>
</div>

<div class="container">
  <h1>MARTSIN SHERSHAN</h1>

  <!-- журнал -->
  <div class="cover">
    <img src="images/photo10.jpg" class="slide active">
    <img src="images/photo11.jpg" class="slide">
    <img src="images/photo12.jpg" class="slide">
    <img src="images/photo13.jpg" class="slide">

    <div class="arrow left">&#8592;</div>
    <div class="arrow right">&#8594;</div>

    <a href="https://buy.stripe.com/14A6oH1JkeJ09EWgBv5Vu00" target="_blank" class="buy-btn">BUY</a>
    <a href="https://t.me/shshmarti?text=%D0%9D%D0%B5%20%D0%BC%D0%BE%D0%B3%D1%83%20%D0%BE%D0%BF%D0%BB%D0%B0%D1%82%D0%B8%D1%82%D1%8C%20%D1%87%D0%B5%D1%80%D0%B5%D0%B7%20Stripe.%20%D0%9A%D0%B0%D0%BA%D0%B8%D0%B5%20%D0%B5%D1%81%D1%82%D1%8C%20%D0%B0%D0%BB%D1%8C%D1%82%D0%B5%D1%80%D0%BD%D1%8B%D0%B5%20%D0%B2%D0%B0%D1%80%D0%B8%D0%B0%D0%BD%D1%82%D1%8B%3F" target="_blank" class="alt-btn">OTHER PAYMENT</a>
  </div>

  <!-- бонус -->
  <div class="bonus">
    <img src="images/pic5.jpg">
  </div>

  <!-- галерея -->
  <div class="gallery">

    <div class="g-slide active"><img src="images/photo1.jpg"></div>
    <div class="g-slide"><img src="images/photo2.jpg"></div>
    <div class="g-slide"><img src="images/photo3.jpg"></div>
    <div class="g-slide"><img src="images/photo4.jpg"></div>
    <div class="g-slide"><img src="images/photo5.jpg"></div>
    <div class="g-slide"><img src="images/photo6.jpg"></div>
    <div class="g-slide"><img src="images/photo7.jpg"></div>
    <div class="g-slide"><img src="images/photo8.jpg"></div>
    <div class="g-slide"><img src="images/photo9.jpg"></div>

    <div class="g-arrow g-left">&#8592;</div>
    <div class="g-arrow g-right">&#8594;</div>

  </div>

</div>

<script>
/* меню */
const btn = document.querySelector('.menu-toggle');
const closeBtn = document.querySelector('.close-btn');

btn.onclick = () => document.body.classList.toggle('menu-open');
closeBtn.onclick = () => document.body.classList.remove('menu-open');

/* журнал */
const slides = document.querySelectorAll('.slide');
let current = 0;

function updateSlides() {
  slides.forEach(s => s.classList.remove('active'));
  slides[current].classList.add('active');
}

document.querySelector('.right').onclick = () => {
  current = (current + 1) % slides.length;
  updateSlides();
};

document.querySelector('.left').onclick = () => {
  current = (current - 1 + slides.length) % slides.length;
  updateSlides();
};

/* галерея */
const gSlides = document.querySelectorAll('.g-slide');
let gCurrent = 0;

function updateGallery() {
  gSlides.forEach(s => s.classList.remove('active'));
  gSlides[gCurrent].classList.add('active');
}

document.querySelector('.g-right').onclick = () => {
  gCurrent = (gCurrent + 1) % gSlides.length;
  updateGallery();
};

document.querySelector('.g-left').onclick = () => {
  gCurrent = (gCurrent - 1 + gSlides.length) % gSlides.length;
  updateGallery();
};

/* свайп */
let startX = 0;

const gallery = document.querySelector('.gallery');

gallery.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

gallery.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    gCurrent = (gCurrent + 1) % gSlides.length;
    updateGallery();
  }

  if (endX - startX > 50) {
    gCurrent = (gCurrent - 1 + gSlides.length) % gSlides.length;
    updateGallery();
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d30000;
      font-family: Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 5px 20px;
    }

    img {
      width: 100%;
      margin-bottom: 40px;
      display: block;
    }

    /* 🔥 ОБЛОЖКА */
    .cover {
      position: relative;
      margin-bottom: 40px;
    }

    /* 💳 BUY */
    .buy-btn {
      position: absolute;
      bottom: 60px;
      left: 20px;

      padding: 12px 18px;
      font-size: 14px;

      background: rgba(0,0,0,0.6);
      color: white;
      text-decoration: none;

      border-radius: 8px;
      backdrop-filter: blur(5px);

      transition: 0.3s;
    }

    .buy-btn:hover {
      background: white;
      color: black;
    }

    /* 💬 TELEGRAM */
    .alt-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;

      padding: 10px 16px;
      font-size: 12px;

      border: 1px solid white;
      color: white;
      text-decoration: none;

      border-radius: 8px;
      background: rgba(0,0,0,0.3);

      transition: 0.3s;
    }

    .alt-btn:hover {
      background: white;
      color: black;
    }

    /* 🔥 бургер */
    .menu-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 28px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: transparent;
      border: none;
      z-index: 9999;
      cursor: pointer;
    }

    .menu-toggle span {
      height: 2px;
      width: 100%;
      background: black;
    }

    /* 📱 меню */
    .side-menu {
      position: fixed;
      top: 70px;
      right: 20px;

      width: 160px;
      padding: 18px;

      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);

      border-radius: 14px;

      opacity: 0;
      pointer-events: none;
      transform: translateY(-10px);

      transition: 0.3s;
      z-index: 9998;
    }

    body.menu-open .side-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .side-menu a {
      display: block;
      margin-bottom: 12px;
      text-decoration: none;
      color: white;
      font-size: 15px;
    }

    /* ❌ крестик */
    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .close-btn::before,
    .close-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 2px;
      background: white;
    }

    .close-btn::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .close-btn::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    @media (min-width: 768px) {
      .menu-toggle {
        display: none;
      }
    }
  </style>
</head>

<body>

  <button class="menu-toggle">

  </button>

  <div class="side-menu">

  <script>
    const btn = document.querySelector('.menu-toggle');
    const closeBtn = document.querySelector('.close-btn');

    btn.addEventListener('click', () => {
      document.body.classList.toggle('menu-open');
    });

    closeBtn.addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
  </script>

</body>
</html>

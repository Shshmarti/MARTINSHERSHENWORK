<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #d30000;
      font-family: Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 5px 20px;
    }

    img {
      width: 100%;
      margin-bottom: 40px;
      display: block;
    }

    /* 🔥 бургер */
    .menu-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 28px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: transparent;
      border: none;
      z-index: 9999;
      cursor: pointer;
    }

    .menu-toggle span {
      height: 2px;
      width: 100%;
      background: black;
      transition: 0.3s;
    }

    .menu-toggle.active span {
      opacity: 0;
    }

    /* 📱 меню */
    .side-menu {
      position: fixed;
      top: 70px;
      right: 20px;

      width: 160px;
      padding: 18px;

      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);

      border-radius: 14px;

      opacity: 0;
      pointer-events: none;
      transform: translateY(-10px);

      transition: 0.3s;
      z-index: 9998;
    }

    body.menu-open .side-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .side-menu a {
      display: block;
      margin-bottom: 12px;
      text-decoration: none;
      color: white;
      font-size: 15px;
    }

    /* ❌ крестик */
    .close-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .close-btn::before,
    .close-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 2px;
      background: white;
    }

    .close-btn::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .close-btn::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    @media (min-width: 768px) {
      .menu-toggle {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- бургер -->
  <button class="menu-toggle">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- меню -->
  <div class="side-menu">
    <div class="close-btn"></div>

    <a href="video.html">Video</a>
    <a href="works.html">Works</a>
    <a href="mailto:shshmarti@yahoo.com">Contact</a>
  </div>

  <div class="container">
    <h1>MARTSIN SHERSHAN</h1>

    <img src="images/photo1.jpg">
    <img src="images/photo2.jpg">
    <img src="images/photo3.jpg">
    <img src="images/photo4.jpg">
    <img src="images/photo5.jpg">
    <img src="images/photo6.jpg">
    <img src="images/photo7.jpg">
    <img src="images/photo8.jpg">
    <img src="images/photo9.jpg">
  </div>

  <script>
    const btn = document.querySelector('.menu-toggle');
    const closeBtn = document.querySelector('.close-btn');

    btn.addEventListener('click', () => {
      document.body.classList.toggle('menu-open');
    });

    closeBtn.addEventListener('click', () => {
      document.body.classList.remove('menu-open');
    });
  </script>

</body>
</html>
